# Automation applications (drives /applications/ hub + cards). Each links to /applications/<slug>/
applications:
  - category: "Assembly & Joining"
    intro: "Precision assembly, fastening, and joining systems built around your part."
    items:
      - name: "Custom Automated Assembly Machines"
        slug: "custom-assembly-machines"
        blurb: "Turnkey assembly cells and lines engineered around your part geometry, cycle time, and quality targets."
      - name: "Servo Press Assembly Stations"
        slug: "servo-press-assembly-stations"
        blurb: "Force- and position-controlled pressing for repeatable, fully monitored press-fit assembly."
      - name: "Robotic Screwdriving Systems"
        slug: "robotic-screwdriving-systems"
        blurb: "Automated fastening with closed-loop torque and depth verification on every joint."
      - name: "Robotic Welding Cells"
        slug: "robotic-welding-cells"
        blurb: "MIG, TIG, spot, and laser welding cells with positioners, fixturing, and weld monitoring."
      - name: "Automated Dispensing Systems"
        slug: "automated-dispensing-systems"
        blurb: "Adhesive, sealant, and fluid dispensing with closed-loop bead inspection."
  - category: "Test & Inspection"
    intro: "Catch every defect before it ships with automated test and vision."
    items:
      - name: "Automated Leak Test Stations"
        slug: "automated-leak-test-stations"
        blurb: "Pressure-decay, mass-flow, and helium leak testing with full data capture."
      - name: "End-of-Line Test Systems"
        slug: "end-of-line-test-systems"
        blurb: "Integrated end-of-line verification that confirms every unit before it leaves the line."
      - name: "Automated Functional Test Stations"
        slug: "automated-functional-test-stations"
        blurb: "Application-specific functional testing that proves the product performs to spec."
      - name: "Machine Vision Inspection Stations"
        slug: "machine-vision-inspection-stations"
        blurb: "High-speed vision for presence, measurement, defect detection, and verification."
  - category: "Marking & Traceability"
    intro: "Permanent identity and full genealogy for every part you build."
    items:
      - name: "Part Marking & Traceability Systems"
        slug: "part-marking-traceability-systems"
        blurb: "Laser marking, 2D codes, and serialized traceability from raw part to finished goods."
      - name: "Automated Labeling Stations"
        slug: "automated-labeling-stations"
        blurb: "Print-and-apply labeling with vision verification of placement and code quality."
  - category: "Robotics & Material Handling"
    intro: "Robots that load, move, pick, and stack so your people don't have to."
    items:
      - name: "Robotic Machine Tending Cells"
        slug: "robotic-machine-tending-cells"
        blurb: "Lights-out loading and unloading for CNC, press, and injection-molding machines."
      - name: "Robotic Bin Picking Systems"
        slug: "robotic-bin-picking-systems"
        blurb: "3D vision-guided picking of randomly oriented parts straight from the bin."
      - name: "Automated Pick-and-Place Systems"
        slug: "automated-pick-and-place-systems"
        blurb: "High-speed, high-accuracy part transfer and placement for high-volume lines."
      - name: "Robotic Palletizing Cells"
        slug: "robotic-palletizing-cells"
        blurb: "End-of-line stacking and unstacking that runs every shift without fatigue."
      - name: "Flexible Feeding Systems"
        slug: "flexible-feeding-systems"
        blurb: "Vision-based flexible feeders that handle multiple parts with fast changeover."
  - category: "Finishing"
    intro: "Consistent, repeatable surface finishing without the manual labor."
    items:
      - name: "Robotic Deburring & Grinding Cells"
        slug: "robotic-deburring-grinding-cells"
        blurb: "Automated edge and surface finishing with force-controlled tooling."
      - name: "Robotic Polishing & Buffing Cells"
        slug: "robotic-polishing-buffing-cells"
        blurb: "Repeatable polishing and buffing to consistent surface-finish targets."

